<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>NL-EN-JP Vocab</title>
    <style>
        :root { --dutch: #FF4B2B; --english: #007AFF; --japanese: #4CD964; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* カード部分 */
        #card-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        #card { background: white; width: 100%; max-width: 400px; height: 350px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        #card:active { transform: scale(0.97); background: #fafafa; }

        .label { font-size: 0.7rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 12px; border-radius: 20px; margin-bottom: 20px; color: white; }
        .nl-bg { background: var(--dutch); }
        .en-bg { background: var(--english); }
        .jp-bg { background: var(--japanese); }

        .word-display { font-size: 2.2rem; font-weight: 700; color: #2d3436; word-break: break-word; line-height: 1.2; }
        .sub-display { font-size: 1.1rem; color: #636e72; margin-top: 20px; min-height: 1.5rem; font-style: italic; }

        /* ボタン部分 */
        #toolbar { height: 100px; display: flex; justify-content: space-evenly; align-items: center; background: white; border-top: 1px solid #eee; padding-bottom: env(safe-area-inset-bottom); }
        .btn { border: none; background: #f1f2f6; color: #2d3436; padding: 15px 25px; border-radius: 15px; font-weight: 600; font-size: 0.9rem; transition: 0.2s; }
        .btn-primary { background: #2d3436; color: white; }

        #count { position: absolute; top: 20px; right: 20px; font-size: 0.8rem; color: #b2bec3; }
    </style>
</head>
<body>

<div id="card-container">
    <div id="card" onclick="nextStep()">
        <div id="count">0 / 0</div>
        <div id="label" class="label nl-bg">Dutch</div>
        <div id="main-word" class="word-display">Loading...</div>
        <div id="sub-word" class="sub-word"></div>
    </div>
</div>

<div id="toolbar">
    <button class="btn" onclick="prevWord()">Back</button>
    <button class="btn btn-primary" onclick="shuffleWords()">Shuffle</button>
    <button class="btn" onclick="nextWord()">Next</button>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9RY2s6DCqud1iHqN1NynoRQOOt2tKK2WxdButOD78d0O1T6_C-EqC46ok4Q9mwh3ZD7cPum5wf5il/pub?output=csv';
    let words = [];
    let currentIndex = 0;
    let step = 0;

    async function loadData() {
        try {
            const res = await fetch(csvUrl);
            const text = await res.text();
            // CSVをパース（簡易版：カンマ区切り。カンマを含むデータがある場合は工夫が必要）
            const rows = text.split(/\r?\n/).slice(1);
            words = rows.map(row => {
                const cols = row.split(',');
                return { nl: cols[0], en: cols[1], jp: cols[2] };
            }).filter(w => w.nl);
            shuffleWords();
        } catch (e) {
            document.getElementById('main-word').innerText = "Error loading data";
        }
    }

    function updateView() {
        const card = words[currentIndex];
        const main = document.getElementById('main-word');
        const sub = document.getElementById('sub-word');
        const label = document.getElementById('label');
        const count = document.getElementById('count');

        count.innerText = `${currentIndex + 1} / ${words.length}`;

        if (step === 0) {
            label.innerText = "Dutch";
            label.className = "label nl-bg";
            main.innerText = card.nl;
            sub.innerText = "";
        } else if (step === 1) {
            label.innerText = "English translation";
            label.className = "label en-bg";
            sub.innerText = card.en;
        } else {
            label.innerText = "Japanese translation";
            label.className = "label jp-bg";
            sub.innerText = card.jp;
        }
    }

    function nextStep() {
        step++;
        if (step > 2) {
            nextWord();
        } else {
            updateView();
        }
    }

    function nextWord() {
        currentIndex = (currentIndex + 1) % words.length;
        step = 0;
        updateView();
    }

    function prevWord() {
        currentIndex = (currentIndex - 1 + words.length) % words.length;
        step = 0;
        updateView();
    }

    function shuffleWords() {
        for (let i = words.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [words[i], words[j]] = [words[j], words[i]];
        }
        currentIndex = 0;
        step = 0;
        updateView();
    }

    loadData();
</script>
</body>
</html>
