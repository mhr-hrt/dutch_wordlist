<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>NL Vocab Master</title>
    <style>
        :root { --dutch: #FF4B2B; --english: #007AFF; --japanese: #4CD964; }
        body { font-family: -apple-system, sans-serif; background: #f5f7fa; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* メニュー画面 */
        #menu { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 20px; gap: 20px; }
        .menu-btn { width: 80%; padding: 25px; border: none; border-radius: 20px; background: white; font-size: 1.2rem; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; }
        .menu-btn:active { transform: scale(0.95); }

        /* 単語帳画面（初期状態は隠す） */
        #game { display: none; flex-direction: column; height: 100%; }
        #card-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        #card { background: white; width: 100%; max-width: 400px; height: 350px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; position: relative; }
        
        .label { font-size: 0.7rem; font-weight: 800; padding: 5px 12px; border-radius: 20px; margin-bottom: 20px; color: white; }
        .nl-bg { background: var(--dutch); }
        .en-bg { background: var(--english); }
        .jp-bg { background: var(--japanese); }
        .word-display { font-size: 2.2rem; font-weight: 700; color: #2d3436; }
        .sub-display { font-size: 1.1rem; color: #636e72; margin-top: 20px; min-height: 1.5rem; }

        #toolbar { height: 100px; display: flex; justify-content: space-evenly; align-items: center; background: white; border-top: 1px solid #eee; padding-bottom: env(safe-area-inset-bottom); }
        .btn { border: none; background: #f1f2f6; padding: 15px 25px; border-radius: 15px; font-weight: 600; }
        #back-to-menu { position: absolute; top: 20px; left: 20px; font-size: 0.8rem; color: #007AFF; }
    </style>
</head>
<body>

<div id="menu">
    <h2 style="margin-bottom: 20px; color: #333;">Category Select</h2>
    <button class="menu-btn" onclick="startApp('nouns')">Nouns (名詞)</button>
    <button class="menu-btn" onclick="startApp('verbs')">Verbs (動詞)</button>
    <button class="menu-btn" onclick="startApp('adjectives')">Adjectives (形容詞)</button>
</div>

<div id="game">
    <div id="card-container">
        <div id="card" onclick="nextStep()">
            <div id="back-to-menu" onclick="showMenu(event)">← Menu</div>
            <div id="label" class="label nl-bg">Dutch</div>
            <div id="main-word" class="word-display">Loading...</div>
            <div id="sub-word" class="sub-word"></div>
        </div>
    </div>
    <div id="toolbar">
        <button class="btn" onclick="prevWord()">Back</button>
        <button class="btn" onclick="resetOrder()">Reset</button> <button class="btn btn-primary" onclick="shuffleWords()">Shuffle</button>
        <button class="btn" onclick="nextWord()">Next</button>
    </div>
</div>

<script>
    const csvUrls = {
        nouns: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9RY2s6DCqud1iHqN1NynoRQOOt2tKK2WxdButOD78d0O1T6_C-EqC46ok4Q9mwh3ZD7cPum5wf5il/pub?output=csv',
        verbs: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSklsR_9-cA0mdTrU12WTj5Zg9IQoR1QsGKQrEToHtNp9nvH8LUNItrokJLxvg-rL9To2jOS3p7ZeUQ/pub?output=csv',
        adjectives: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSrSqR8IqeDYNMUlJhW117RTlWMdQzGeS62uGWm1ykKaKlxB4nZtzBuc5afA9Pa9F7lif7WX0xi2tSz/pub?output=csv'
    };

    let originalWords = [];
    let words = [];
    let currentIndex = 0;
    let step = 0;

    async function startApp(category) {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game').style.display = 'flex';
        document.getElementById('main-word').innerText = "Loading...";
        
        try {
            const res = await fetch(csvUrls[category]);
            const text = await res.text();
            const rows = text.split(/\r?\n/).slice(1);
            words = rows.map(row => {
                const cols = row.split(',');
                return { nl: cols[0], en: cols[1], jp: cols[2] };
            }).filter(w => w.nl);
            shuffleWords();
        } catch (e) {
            alert("データの読み込みに失敗しました。URLを確認してください。");
        }

        const res = await fetch(csvUrls[category]);
        const text = await res.text();
        const rows = text.split(/\r?\n/).slice(1);
        
        // データを読み込む
        const loadedData = rows.map(row => {
            const cols = row.split(',');
            return { nl: cols[0], en: cols[1], jp: cols[2] };
        }).filter(w => w.nl);

        // ★ ここがポイント：読み込んだ順を「保存用」と「表示用」両方に入れる
        originalWords = [...loadedData]; 
        words = [...loadedData]; 
        
        currentIndex = 0;
        step = 0;
        updateView();
    }

    function showMenu(event) {
        event.stopPropagation(); // カードクリックのイベントを防ぐ
        document.getElementById('game').style.display = 'none';
        document.getElementById('menu').style.display = 'flex';
    }

    function updateView() {
        const card = words[currentIndex];
        const main = document.getElementById('main-word');
        const sub = document.getElementById('sub-word');
        const label = document.getElementById('label');

        if (step === 0) {
            label.innerText = "Dutch";
            label.className = "label nl-bg";
            main.innerText = card.nl;
            sub.innerText = "";
        } else if (step === 1) {
            label.innerText = "English";
            label.className = "label en-bg";
            sub.innerText = card.en;
        } else {
            label.innerText = "Japanese";
            label.className = "label jp-bg";
            sub.innerText = card.jp;
        }
    }

    function nextStep() {
        step++;
        if (step > 2) nextWord();
        else updateView();
    }

    function nextWord() {
        currentIndex = (currentIndex + 1) % words.length;
        step = 0;
        updateView();
    }

    function prevWord() {
        currentIndex = (currentIndex - 1 + words.length) % words.length;
        step = 0;
        updateView();
    }

    function shuffleWords() {
        for (let i = words.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [words[i], words[j]] = [words[j], words[i]];
        }
        currentIndex = 0;
        step = 0;
        updateView();
    }

    function resetOrder() {
        if (originalWords.length === 0) return;
        words = [...originalWords]; // 保存しておいた元の順番をコピー
        currentIndex = 0;
        step = 0;
        updateView();
        alert("Original order restored!");
    }
</script>
</body>
</html>
